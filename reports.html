<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reports</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/png" href="icons/memo.png">
</head>
<body class="dark reports-body">
  <main class="reports-page">
    <div class="reports-header">
      <h1>Reports</h1>
      <a href="/">Back to Study</a>
    </div>

    <div id="reports-list" class="reports-list">
      Loading reports...
    </div>
  </main>

  <script>
    async function loadReports() {
      const list = document.getElementById('reports-list');
      list.replaceChildren();

      try {
        const res = await fetch('/reports');
        if (!res.ok) throw new Error('Could not load reports');

        const reports = await res.json();

        reports.sort((a, b) => {
          if (Number(a.resolved) !== Number(b.resolved)) {
            return Number(a.resolved) - Number(b.resolved);
          }
          return Number(b.id) - Number(a.id);
        });

        if (!reports.length) {
          const empty = document.createElement('div');
          empty.className = 'report-card';
          empty.textContent = 'No reports yet.';
          list.appendChild(empty);
          return;
        }

        reports.forEach(report => {
          list.appendChild(renderReportCard(report));
        });
      } catch (err) {
        const error = document.createElement('div');
        error.className = 'report-card error';
        error.textContent = err.message;
        list.replaceChildren(error);
      }
    }

    function renderReportCard(report) {
      let struct = '';
      if (report.struct) {
        try {
          struct = JSON.stringify(JSON.parse(report.struct), null, 2);
        } catch {
          struct = report.struct;
        }
      }

      const isResolved = Boolean(report.resolved);

      const card = document.createElement('article');
      card.className = `report-card ${isResolved ? 'resolved' : ''}`;

      const meta = document.createElement('div');
      meta.className = 'report-meta';

      const id = document.createElement('span');
      id.textContent = `#${report.id}`;

      const status = document.createElement('span');
      status.textContent = isResolved ? 'Fixed' : 'Open';

      const createdAt = document.createElement('span');
      createdAt.textContent = new Date(report.created_at).toLocaleString();

      const button = document.createElement('button');
      button.className = 'report-resolve-btn';
      button.dataset.id = String(report.id);
      button.dataset.resolved = isResolved ? '0' : '1';
      button.textContent = isResolved ? 'Mark open' : 'Mark fixed';
      button.addEventListener('click', () => toggleResolved(button));

      meta.append(id, status, createdAt, button);

      const body = document.createElement('p');
      body.textContent = report.report || '';

      card.append(meta, body);

      if (struct) {
        const pre = document.createElement('pre');
        pre.textContent = struct;
        card.appendChild(pre);
      }

      return card;
    }

    async function toggleResolved(btn) {
      const id = btn.dataset.id;
      const resolved = btn.dataset.resolved === '1';

      btn.disabled = true;
      btn.textContent = resolved ? 'Marking fixed...' : 'Reopening...';

      try {
        const res = await fetch(`/reports/${id}/resolved?resolved=${resolved}`, {
          method: 'PATCH'
        });

        if (!res.ok) throw new Error('Could not update report');

        await loadReports();
      } catch (err) {
        alert(err.message);
        btn.disabled = false;
      }
    }

    loadReports();
  </script>
</body>
</html>
